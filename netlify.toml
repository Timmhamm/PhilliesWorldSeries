[build]
  command   = "npm run build"
  publish   = "dist/phillies-world-series-meter"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION                    = "18"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"

[functions]
  directory = "netlify/functions"
  timeout   = 26
  included_files = ["node_modules/@sparticuz/chromium/bin/**"]

[[redirects]]
  from   = "/api/stats"
  to     = "/.netlify/functions/stats"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
